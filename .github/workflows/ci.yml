name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts (forge test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # forge-std + openzeppelin-contracts
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge test
        working-directory: contracts
        run: forge test -vvv

  web:
    name: web (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: install deps
        run: bun install
      - name: typecheck
        working-directory: web
        run: bun run typecheck
